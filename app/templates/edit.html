{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">Editar Tarea</div>
            <div class="card-body">
                <form action="/tasks/{{ task.id }}/update" method="post">
                    <div class="mb-3">
                        <label>Título</label>
                        <input type="text" name="title" class="form-control" value="{{ task.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label>Descripción</label>
                        <textarea name="description" class="form-control"
                            rows="3">{{ task.description or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label>Prioridad</label>
                        <select name="priority" class="form-select">
                            <option value="low" {% if task.priority=='low' %}selected{% endif %}>Baja</option>
                            <option value="medium" {% if task.priority=='medium' %}selected{% endif %}>Media</option>
                            <option value="high" {% if task.priority=='high' %}selected{% endif %}>Alta</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Estado</label>
                        <select name="status" class="form-select">
                            <option value="pending" {% if task.status=='pending' %}selected{% endif %}>Pendiente
                            </option>
                            <option value="in_progress" {% if task.status=='in_progress' %}selected{% endif %}>En
                                progreso</option>
                            <option value="completed" {% if task.status=='completed' %}selected{% endif %}>Completada
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Fecha límite</label>
                        <input type="date" name="due_date" class="form-control"
                            value="{{ task.due_date if task.due_date else '' }}">
                    </div>
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                    <a href="/" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
