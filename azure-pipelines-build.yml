trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.tf'
      - '*.tfvars'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: Release-Vars
  - group: ACR-Credentials   # Para obtener el acrServer

steps:
# 1. Construir y pushear la imagen directamente en el ACR (sin Docker local,
#    misma conexión ARM que el resto de los pipelines; evita el problema de
#    necesitar una service connection de tipo "Docker Registry" aparte)
- task: AzureCLI@2
  displayName: 'Build & push imagen (az acr build)'
  inputs:
    azureSubscription: 'azure semestral'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      set -e
      ACR_NAME=$(echo "$(acrServer)" | cut -d'.' -f1)
      az acr build \
        --registry "$ACR_NAME" \
        --image todo-api:$(Build.BuildId) \
        --image todo-api:latest \
        .

# 2. Actualizar el grupo de variables Release-Vars con el nuevo tag
- script: |
    set -e
    az config set extension.use_dynamic_install=yes_without_prompt
    az extension add --name azure-devops --yes
    az devops configure --defaults organization=$(System.TeamFoundationCollectionUri) project=$(System.TeamProject)

    GROUP_ID=$(az pipelines variable-group list --query "[?name=='Release-Vars'].id" -o tsv)

    if [ -z "$GROUP_ID" ]; then
      echo "Creando grupo Release-Vars..."
      az pipelines variable-group create --name "Release-Vars" --variables imageTag="$(Build.BuildId)"
    else
      az pipelines variable-group variable update --group-id $GROUP_ID --name imageTag --value "$(Build.BuildId)"
    fi
  displayName: 'Actualizar imageTag en Release-Vars'
  env:
    AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
