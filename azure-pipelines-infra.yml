trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: Release-Vars
  - group: ACR-Credentials   # Para obtener el acrServer

steps:
# 1. Iniciar sesión en ACR usando la conexión de servicio (más segura)
- task: AzureCLI@2
  displayName: 'Login a ACR'
  inputs:
    azureSubscription: 'azure-connection'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      az acr login --name $(acrServer)

# 2. Construir y pushear la imagen con Docker
- task: Docker@2
  inputs:
    containerRegistry: 'azure-connection'  # Usamos la misma conexión ARM (tiene permisos para ACR)
    repository: 'todo-api'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: |
      $(Build.BuildId)
      latest

# 3. Actualizar el grupo de variables Release-Vars con el nuevo tag
- script: |
    az extension add --name azure-devops --yes
    PROJECT_ID=$(az devops project show --project "$(System.TeamProject)" --query id -o tsv)
    GROUP_ID=$(az pipelines variable-group list --project "$(System.TeamProject)" --query "[?name=='Release-Vars'].id" -o tsv)

    if [ -z "$GROUP_ID" ]; then
      echo "Creando grupo Release-Vars..."
      az pipelines variable-group create --name "Release-Vars" --project "$(System.TeamProject)" --variables imageTag="$(Build.BuildId)"
    else
      az pipelines variable-group variable update --group-id $GROUP_ID --name imageTag --value "$(Build.BuildId)" --project "$(System.TeamProject)"
    fi
  displayName: 'Actualizar imageTag en Release-Vars'
  env:
    AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)